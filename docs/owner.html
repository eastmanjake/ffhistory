<script>
// ── Playoff result for an owner in a single season ────────────────────────────
function getPlayoffResult(ownerTeams, matchups) {
  const pg = matchups.filter(m => m.playoff);
  if (!pg.length) return null;

  const inGame  = m => ownerTeams.has(m.team1) || ownerTeams.has(m.team2);
  const wonGame = m => {
    const s1 = parseFloat(m.score1), s2 = parseFloat(m.score2);
    return s1 > s2 ? ownerTeams.has(m.team1) : ownerTeams.has(m.team2);
  };

  const champ = pg.find(m => m.round === 'Championship');
  if (champ && inGame(champ)) return wonGame(champ) ? 'champion' : 'runnerup';

  const third = pg.find(m => m.round === '3rd Place');
  if (third && inGame(third)) return wonGame(third) ? 'third' : 'fourth';

  if (pg.some(m => m.round === 'Semifinal'   && inGame(m))) return 'semi';
  if (pg.some(m => m.round === 'Quarterfinal' && inGame(m))) return 'quarter';

  return 'missed';
}

const RESULT_LABELS = {
  champion:  { label: '🏆 Champion',    cls: 'result-champ' },
  runnerup:  { label: '🥈 Runner-Up',   cls: 'result-runnerup' },
  third:     { label: '🥉 3rd Place',   cls: 'result-third' },
  fourth:    { label: '4th Place',       cls: 'result-third' },
  semi:      { label: 'Semifinal',       cls: 'result-semi' },
  quarter:   { label: 'Quarterfinal',    cls: 'result-quarter' },
  missed:    { label: 'Missed Playoffs', cls: 'result-missed' },
};

// ── Draft: identify keeper and true first pick for a given owner/year ──────────
function buildDraftHighlights(ownerName, seasons, allStandings, allDraft, keepersManual) {
  const highlights = [];
  for (const year of [...seasons].reverse()) {
    const standings = allStandings[year] || [];
    const draft     = allDraft[year]     || [];
    const ownerEntry = standings.find(s => normOwner(s.owner) === ownerName);
    if (!ownerEntry || !draft.length) continue;
    const ownerTeam = ownerEntry.team;

    let keeper    = null;
    let firstPick = null;

    if (year < PRE_MODERN_CUTOFF) {
      // Pre-2016: no keeper system — round 1 is a genuine first pick
      firstPick = draft.find(d => d.team === ownerTeam && d.round === 1) || null;
    } else if (year <= 2024) {
      // 2016–2024: round 1 = keeper, round 2 = true first pick
      keeper    = draft.find(d => d.team === ownerTeam && d.round === 1) || null;
      firstPick = draft.find(d => d.team === ownerTeam && d.round === 2) || null;
    } else {
      // 2025+: keeper from manual list (any round)
      const manual = (keepersManual || []).find(k => normOwner(k.owner) === ownerName);
      if (manual) {
        keeper = draft.find(d => d.team === ownerTeam && d.round === manual.round) || null;
      }
      // First actual pick: round 1 if keeper is not in round 1, else round 2
      const keeperRound = manual ? manual.round : null;
      const fpRound = keeperRound === 1 ? 2 : 1;
      firstPick = draft.find(d => d.team === ownerTeam && d.round === fpRound) || null;
    }

    if (keeper || firstPick) highlights.push({ year, keeper, firstPick });
  }
  return highlights;
}

// ── Player Hall of Fame ───────────────────────────────────────────────────────
function buildPlayerHoF(ownerName, seasons, allStandings, allLineups, champYears) {
  const BN_SLOTS  = new Set(['BN', 'IR', 'IL']);
  const POSITIONS = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'];

  const playerMap     = {}; // `player|pos` → { player, pos, pts, seasons: Set }
  const champSeasons  = {}; // year → { team, players: { `player|pos` → { player, pos, pts } } }

  for (const year of seasons) {
    const standings = allStandings[year] || [];
    const lineups   = allLineups[year]   || [];
    const ownerEntry = standings.find(s => normOwner(s.owner) === ownerName);
    if (!ownerEntry) continue;
    const ownerTeam  = ownerEntry.team;
    const isChamp    = champYears.includes(year);
    if (isChamp) champSeasons[year] = { team: ownerTeam, players: {} };

    for (const l of lineups) {
      if (l.team !== ownerTeam) continue;
      if (BN_SLOTS.has(l.slot))  continue;

      const pts = parseFloat(l.fantasy_pts) || 0;
      const pos = l.pos;
      const key = `${l.player}|${pos}`;

      if (!playerMap[key]) playerMap[key] = { player: l.player, pos, pts: 0, seasons: new Set() };
      playerMap[key].pts += pts;
      playerMap[key].seasons.add(year);

      if (isChamp) {
        const cp = champSeasons[year].players;
        if (!cp[key]) cp[key] = { player: l.player, pos, pts: 0 };
        cp[key].pts += pts;
      }
    }
  }

  // Position leaders
  const posLeaders = {};
  for (const entry of Object.values(playerMap)) {
    if (!POSITIONS.includes(entry.pos)) continue;
    if (!posLeaders[entry.pos] || entry.pts > posLeaders[entry.pos].pts) {
      const sortedYears = [...entry.seasons].sort((a, b) => a - b);
      posLeaders[entry.pos] = { ...entry, seasons: sortedYears };
    }
  }

  // Championship impact: top 7 starters per champ season, sorted by pts
  const champImpact = champYears
    .filter(y => champSeasons[y])
    .map(y => ({
      year: y,
      team: champSeasons[y].team,
      players: Object.values(champSeasons[y].players)
        .sort((a, b) => b.pts - a.pts)
        .slice(0, 7),
    }));

  return { posLeaders, champImpact };
}

// ── Main entry point ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const ownerParam       = new URLSearchParams(location.search).get('owner');
  const includePreModern = localStorage.getItem('includePreModern') === 'true';

  // For the directory, always use modern seasons; profiles respect the toggle
  const modernSeasons = ALL_SEASONS.filter(y => y >= PRE_MODERN_CUTOFF);
  const profileSeasons = includePreModern ? ALL_SEASONS : modernSeasons;
  const loadSeasons    = ownerParam ? profileSeasons : modernSeasons;

  // Load all data for the relevant seasons
  const [allStandings, allMatchups, allDraft, allLineups, keepersManual] = await Promise.all([
    Promise.all(loadSeasons.map(y => loadFile(y, 'standings.json').catch(() => null)))
      .then(arr => Object.fromEntries(loadSeasons.map((y, i) => [y, arr[i]]))),
    Promise.all(loadSeasons.map(y => loadFile(y, 'matchups.json').catch(() => null)))
      .then(arr => Object.fromEntries(loadSeasons.map((y, i) => [y, arr[i]]))),
    Promise.all(loadSeasons.map(y => loadFile(y, 'draft.json').catch(() => null)))
      .then(arr => Object.fromEntries(loadSeasons.map((y, i) => [y, arr[i]]))),
    Promise.all(loadSeasons.map(y => loadFile(y, 'weekly_lineups.json').catch(() => null)))
      .then(arr => Object.fromEntries(loadSeasons.map((y, i) => [y, arr[i]]))),
    loadFile(2025, 'keepers_manual.json').catch(() => []),
  ]);

  // Build owner → years map from modern seasons (determines who's in the directory)
  const ownerSeasons = {};
  for (const year of modernSeasons) {
    const standings = allStandings[year] || [];
    standings.forEach(s => {
      const owner = normOwner(s.owner);
      (ownerSeasons[owner] = ownerSeasons[owner] || []).push(year);
    });
  }

  // Career stats aggregated across loadSeasons
  function buildCareerStats(ownerName) {
    let wins = 0, losses = 0, pf = 0, pa = 0;
    let championships = 0, numSeasons = 0;
    const seasonRows = [];

    for (const year of loadSeasons) {
      const standings = allStandings[year] || [];
      const matchups  = allMatchups[year]  || [];
      const entry = standings.find(s => normOwner(s.owner) === ownerName);
      if (!entry) continue;

      numSeasons++;
      const w    = parseInt(entry.wins)          || 0;
      const l    = parseInt(entry.losses)        || 0;
      const pfV  = parseFloat(entry.points_for)  || 0;
      const paV  = parseFloat(entry.points_against) || 0;
      wins   += w; losses += l; pf += pfV; pa += paV;

      const ownerTeams = new Set(
        standings.filter(s => normOwner(s.owner) === ownerName).map(s => s.team)
      );
      const result = getPlayoffResult(ownerTeams, matchups);
      if (result === 'champion') championships++;

      seasonRows.push({
        year, team: entry.team,
        wins: w, losses: l, pf: pfV, pa: paV,
        rank: parseInt(entry.rank), result,
      });
    }
    return { wins, losses, pf, pa, championships, numSeasons, seasonRows };
  }

  if (ownerParam) {
    renderProfile(ownerParam, allStandings, allMatchups, allDraft, allLineups,
                  keepersManual, loadSeasons, buildCareerStats);
  } else {
    renderDirectory(ownerSeasons, buildCareerStats);
  }
});

// ── Directory view ─────────────────────────────────────────────────────────────
function renderDirectory(ownerSeasons, buildCareerStats) {
  document.title = 'Owner Profiles — The League';
  const owners = Object.keys(ownerSeasons).sort();

  const cards = owners.map(owner => {
    const stats = buildCareerStats(owner);
    const winPct = stats.wins + stats.losses > 0
      ? ((stats.wins / (stats.wins + stats.losses)) * 100).toFixed(1)
      : '—';
    const champs = '🏆'.repeat(stats.championships) || '';
    return `
      <a class="owner-card" href="owner.html?owner=${encodeURIComponent(owner)}">
        <div class="owner-card-name">${owner}</div>
        <div class="owner-card-champs">${champs}</div>
        <div class="owner-card-stats">
          <div class="owner-card-stat"><div class="val">${stats.numSeasons}</div><div class="lbl">Seasons</div></div>
          <div class="owner-card-stat"><div class="val">${stats.wins}–${stats.losses}</div><div class="lbl">Record</div></div>
          <div class="owner-card-stat"><div class="val">${winPct}%</div><div class="lbl">Win%</div></div>
        </div>
      </a>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <h1>Owner Profiles</h1>
      <p>Current league members — 2016 to present</p>
    </div>
    <div class="owner-grid">${cards}</div>
  `;
}

// ── Profile view ───────────────────────────────────────────────────────────────
function renderProfile(ownerName, allStandings, allMatchups, allDraft, allLineups,
                       keepersManual, seasons, buildCareerStats) {
  document.title = `${ownerName} — The League`;

  const stats = buildCareerStats(ownerName);
  if (!stats.numSeasons) {
    document.getElementById('app').innerHTML = `
      <a class="profile-back" href="owner.html">← All Owners</a>
      <p style="color:var(--muted)">No data found for "${ownerName}".</p>
    `;
    return;
  }

  const { wins, losses, pf, pa, championships, numSeasons, seasonRows } = stats;
  const totalGames = wins + losses;
  const winPct  = totalGames ? ((wins / totalGames) * 100).toFixed(1) : '—';
  const champStr = '🏆'.repeat(championships) || '';

  // Season range label
  const years = seasonRows.map(r => r.year).sort((a, b) => a - b);
  const seasonRange = years.length > 1 ? `${years[0]}–${years[years.length - 1]}` : `${years[0]}`;

  // ── Career highlights ──────────────────────────────────────────
  const byWins   = [...seasonRows].sort((a, b) => b.wins - a.wins   || b.pf - a.pf);
  const byPF     = [...seasonRows].sort((a, b) => b.pf - a.pf);
  const byLoss   = [...seasonRows].sort((a, b) => b.losses - a.losses || a.pf - b.pf);
  const bestWin  = byWins[0];
  const bestPF   = byPF[0];
  const worstSzn = byLoss[0];
  const playoffCount = seasonRows.filter(r => r.result !== 'missed').length;

  const highlights = [
    { label: 'Best Record',           value: `${bestWin.wins}–${bestWin.losses}`, sub: bestWin.year },
    { label: 'Best Scoring Season',   value: bestPF.pf.toFixed(0) + ' pts',       sub: bestPF.year },
    { label: 'Worst Record',          value: `${worstSzn.wins}–${worstSzn.losses}`, sub: worstSzn.year },
    { label: 'Playoff Appearances',   value: `${playoffCount} / ${numSeasons}`,   sub: `${((playoffCount/numSeasons)*100).toFixed(0)}% appearance rate` },
    { label: 'Avg PF / Season',       value: (pf / numSeasons).toFixed(0) + ' pts', sub: `${(pa / numSeasons).toFixed(0)} pts against` },
  ];

  // ── Player Hall of Fame ────────────────────────────────────────
  const champYears = seasonRows.filter(r => r.result === 'champion').map(r => r.year);
  const { posLeaders, champImpact } = buildPlayerHoF(ownerName, seasons, allStandings, allLineups, champYears);

  const POSITIONS = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'];

  const hofCardsHtml = POSITIONS.map(pos => {
    const leader = posLeaders[pos];
    if (!leader) {
      return `
        <div class="hof-card">
          <span class="pos-${pos}" style="font-size:11px;font-weight:700">${pos}</span>
          <div class="hof-empty">—</div>
        </div>`;
    }
    const yrs = leader.seasons;
    const yearLabel = yrs.length > 1 ? `${yrs[0]}–${yrs[yrs.length - 1]}` : `${yrs[0]}`;
    return `
      <div class="hof-card">
        <span class="pos-${pos}" style="font-size:11px;font-weight:700">${pos}</span>
        <div class="hof-name">${leader.player}</div>
        <div class="hof-pts">${leader.pts.toFixed(0)} pts</div>
        <div class="hof-years">${yearLabel}</div>
      </div>`;
  }).join('');

  const champImpactHtml = champImpact.length ? `
    <p class="hof-section-label" style="margin-top:24px">Championship Season Impact</p>
    ${champImpact.map(({ year, team, players }) => `
      <div class="champ-impact-year">🏆 ${year} — <span style="font-weight:400;color:var(--muted);font-size:12px">${team}</span></div>
      <div class="table-wrap" style="margin-bottom:8px">
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Pos</th>
              <th class="num">Season Pts</th>
            </tr>
          </thead>
          <tbody>
            ${players.map(p => `
              <tr>
                <td>${p.player}</td>
                <td><span class="pos-${p.pos}" style="font-size:11px;font-weight:600">${p.pos}</span></td>
                <td class="num">${p.pts.toFixed(0)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`).join('')}
  ` : '';

  // ── Season-by-season table rows ────────────────────────────────
  const seasonTableRows = [...seasonRows].reverse().map(r => {
    const res = RESULT_LABELS[r.result] || { label: '—', cls: '' };
    return `
      <tr>
        <td><a href="season.html?year=${r.year}">${r.year}</a></td>
        <td style="color:var(--muted);font-size:12px">${r.team}</td>
        <td class="num win">${r.wins}</td>
        <td class="num loss">${r.losses}</td>
        <td class="num">${r.pf.toFixed(2)}</td>
        <td class="num">${r.rank}</td>
        <td><span class="${res.cls}">${res.label}</span></td>
      </tr>
    `;
  }).join('');

  // ── H2H records ────────────────────────────────────────────────
  const h2hWins = {}, h2hLoss = {};
  for (const year of seasons) {
    const standings = allStandings[year] || [];
    const matchups  = allMatchups[year]  || [];
    const ownerTeams = new Set(
      standings.filter(s => normOwner(s.owner) === ownerName).map(s => s.team)
    );
    if (!ownerTeams.size) continue;
    const teamOwner = buildTeamOwnerMap(standings);

    matchups.filter(m => !m.playoff).forEach(m => {
      const isTeam1 = ownerTeams.has(m.team1);
      const isTeam2 = ownerTeams.has(m.team2);
      if (!isTeam1 && !isTeam2) return;

      const oppTeam  = isTeam1 ? m.team2 : m.team1;
      const oppOwner = normOwner(teamOwner[oppTeam] || oppTeam);
      if (oppOwner === ownerName) return;

      const s1 = parseFloat(m.score1), s2 = parseFloat(m.score2);
      const won = isTeam1 ? s1 > s2 : s2 > s1;

      if (won) h2hWins[oppOwner] = (h2hWins[oppOwner] || 0) + 1;
      else     h2hLoss[oppOwner] = (h2hLoss[oppOwner] || 0) + 1;
    });
  }

  const h2hOwners = [...new Set([...Object.keys(h2hWins), ...Object.keys(h2hLoss)])].sort();
  const h2hRows = h2hOwners.map(opp => {
    const w = h2hWins[opp] || 0, l = h2hLoss[opp] || 0;
    const g = w + l;
    const pct    = g ? ((w / g) * 100).toFixed(1) : '—';
    const pctNum = g ? w / g : 0;
    return { opp, w, l, pct, pctNum, g };
  }).sort((a, b) => b.pctNum - a.pctNum || b.g - a.g);

  const h2hTableRows = h2hRows.map(r => `
    <tr>
      <td><a href="owner.html?owner=${encodeURIComponent(r.opp)}">${r.opp}</a></td>
      <td class="num win">${r.w}</td>
      <td class="num loss">${r.l}</td>
      <td class="num">${r.g}</td>
      <td class="num">${r.pct}%</td>
    </tr>
  `).join('');

  // ── Draft History: keepers + first picks ───────────────────────
  const draftHighlights = buildDraftHighlights(ownerName, seasons, allStandings, allDraft, keepersManual);

  // Favorite kept position (from keeper picks; fall back to first picks for pre-2016)
  const positionCounts = {};
  for (const { year, keeper, firstPick } of draftHighlights) {
    const pick = keeper || (year < PRE_MODERN_CUTOFF ? firstPick : null);
    if (pick) positionCounts[pick.position] = (positionCounts[pick.position] || 0) + 1;
  }
  const topPos = Object.entries(positionCounts).sort((a, b) => b[1] - a[1]);
  const favPos = topPos.map(([pos, cnt]) => `${pos} (${cnt})`).join(', ');

  const draftRows = draftHighlights.map(({ year, keeper, firstPick }) => {
    let rows = '';
    if (keeper) {
      rows += `
        <tr class="draft-row-keeper">
          <td>${year}</td>
          <td class="num" style="color:var(--muted)">Rd ${keeper.round}</td>
          <td>${keeper.player}</td>
          <td><span class="pos-${keeper.position}" style="font-size:11px;font-weight:600">${keeper.position}</span></td>
          <td><span class="keeper-badge">K</span></td>
        </tr>`;
    }
    if (firstPick) {
      rows += `
        <tr>
          <td>${keeper ? '' : year}</td>
          <td class="num" style="color:var(--muted)">Rd ${firstPick.round}</td>
          <td>${firstPick.player}</td>
          <td><span class="pos-${firstPick.position}" style="font-size:11px;font-weight:600">${firstPick.position}</span></td>
          <td><span class="pick-label">1st Pick</span></td>
        </tr>`;
    }
    return rows;
  }).join('');

  const draftNote = `<span style="font-weight:400;color:var(--muted);font-size:11px">
    (keepers &amp; first picks — Rd&nbsp;1 picks prior to 2025 are keepers; true 1st pick = Rd&nbsp;2)
  </span>`;

  // ── Render ─────────────────────────────────────────────────────
  document.getElementById('app').innerHTML = `
    <a class="profile-back" href="owner.html">← All Owners</a>

    <div class="profile-hero">
      <div class="profile-name-block">
        <div class="profile-name">${ownerName}</div>
        <div class="profile-champs">${champStr}</div>
        <div class="profile-subtext">${numSeasons} season${numSeasons !== 1 ? 's' : ''} &bull; ${seasonRange}</div>
      </div>
      <div class="profile-stats-row">
        <div class="profile-stat"><div class="val">${wins}–${losses}</div><div class="lbl">All-Time Record</div></div>
        <div class="profile-stat"><div class="val">${winPct}%</div><div class="lbl">Win %</div></div>
        <div class="profile-stat"><div class="val">${championships}</div><div class="lbl">Championships</div></div>
        <div class="profile-stat"><div class="val">${pf.toFixed(0)}</div><div class="lbl">Total PF</div></div>
      </div>
    </div>

    <div class="highlights">
      ${highlights.map(h => `
        <div class="highlight-card">
          <div class="hl-label">${h.label}</div>
          <div class="hl-value">${h.value}</div>
          <div class="hl-sub">${h.sub}</div>
        </div>
      `).join('')}
    </div>

    <section>
      <h2>Player Hall of Fame</h2>
      <p class="hof-section-label">All-Time Position Leaders</p>
      <div class="hof-grid">${hofCardsHtml}</div>
      ${champImpactHtml}
    </section>

    <section>
      <h2>Season by Season</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th>Team</th>
              <th class="num">W</th>
              <th class="num">L</th>
              <th class="num">PF</th>
              <th class="num">Finish</th>
              <th>Playoff Result</th>
            </tr>
          </thead>
          <tbody>${seasonTableRows}</tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>Head-to-Head vs All Owners <span style="font-weight:400;color:var(--muted);font-size:11px">(regular season)</span></h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Opponent</th>
              <th class="num">W</th>
              <th class="num">L</th>
              <th class="num">Games</th>
              <th class="num">Win%</th>
            </tr>
          </thead>
          <tbody>${h2hTableRows}</tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>Draft History ${draftNote}</h2>
      ${favPos ? `<p style="color:var(--muted);font-size:12px;margin-bottom:12px">Favorite kept position: <strong style="color:var(--text)">${favPos}</strong></p>` : ''}
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th class="num">Round</th>
              <th>Player</th>
              <th>Pos</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody>${draftRows || '<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:24px">No draft data available</td></tr>'}</tbody>
        </table>
      </div>
    </section>
  `;
}
</script>
</body>
</html>
